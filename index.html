<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鄭怡君 | 個人網頁</title>
    <style>
        /* 現代簡約配色 */
        :root {
            --main-dark: #2c3e50;
            --main-gray: #ecf0f1;
            --accent: #34495e;
            --text: #333;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #fcfcfc;
            color: var(--text);
            margin: 0;
            line-height: 1.7;
        }

        /* 頂部裝飾條 */
        .top-bar {
            height: 5px;
            background: linear-gradient(to right, #2c3e50, #bdc3c7);
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--main-dark);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #7f8c8d;
            font-weight: 300;
        }

        section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 30px;
            border-left: 4px solid var(--main-dark);
        }

        h2 {
            font-size: 1.3rem;
            margin-top: 0;
            color: var(--main-dark);
            display: flex;
            align-items: center;
        }

        /* 技能列表樣式 */
        .skill-list {
            list-style: none;
            padding: 0;
        }

        .skill-list li {
            background: var(--main-gray);
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .hobby-tag {
            display: inline-block;
            background: #eef2f3;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-right: 10px;
        }

        footer {
            text-align: center;
            margin-top: 100px;
            padding-bottom: 40px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <div class="container">
        <header>
            <h1>鄭怡君</h1>
            <p class="subtitle">國立屏東科技大學 · 工業管理系</p>
        </header>

        <section>
            <h2>關於我</h2>
            <p>你好，我是怡君。目前就讀於屏科大工管系。除了系上的專業課程外，我對資訊技術有一定的熱情，也喜歡在課後鑽研感興趣的事物。</p>
        </section>

        <section>
            <h2>資訊技能</h2>
            <ul class="skill-list">
                <li>基礎程式語言編寫 (Programming Logic)</li>
                <li>工業工程相關軟體應用</li>
                <li>數據處理與邏輯分析</li>
            </ul>
        </section>

        <section>
            <h2>私下興趣</h2>
            <p>在學業之外，我對<b>影片剪輯</b>有濃厚的興趣，喜歡紀錄生活或製作小短片，這是我發揮創意與美感的方式。</p>
            <div>
                <span class="hobby-tag"># 影片剪輯</span>
                <span class="hobby-tag"># 影像創作</span>
                <span class="hobby-tag"># 自學探索</span>
            </div>
        </section>

        <section>
            <h2>聯絡方式</h2>
            <p>Email: [請輸入你的信箱]</p>
            <p>所在地: 屏東縣內埔鄉</p>
        </section>

        <footer>
            &copy; 2026 CHENG YI-CHUN. 
        </footer>
    </div>

</body>
</html>
